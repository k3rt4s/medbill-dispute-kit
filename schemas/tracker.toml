# Schema: the master tracker CSV the patient carries between sessions
# This is the canonical "where I am in the dispute process" document.
# Column order in the CSV must match the order below.
# Multi-value fields are semicolon-separated strings (so they survive CSV without quoting tricks).

[meta]
schema = "tracker"
schema_version = "0.1.0"
file_format = "csv"
encoding = "utf-8"
line_endings = "lf"
notes = "Each row is one bill. Actions taken against a bill are tracked separately; see schemas/action.toml. The tracker is the persistent state; the action log is append-only history kept in a parallel file or in the notes field."

[[columns]]
name = "bill_id"
type = "string"
required = true
description = "Matches bill.toml.bill_id. Stable across sessions."

[[columns]]
name = "encounter_id"
type = "string"
required = false
description = "Matches bill.toml.encounter_id. Links related bills from the same care encounter. Auto-populated by check_completeness.py by clustering bills with overlapping dates of service (+/- 1 day). User can override and the override is preserved across runs."

[[columns]]
name = "provider_name"
type = "string"
required = true

[[columns]]
name = "provider_type"
type = "string"
required = true
description = "From bill.toml.provider_type enum."

[[columns]]
name = "account_number"
type = "string"
required = true

[[columns]]
name = "statement_date"
type = "date"
required = true

[[columns]]
name = "date_of_service_start"
type = "date"
required = true

[[columns]]
name = "date_of_service_end"
type = "date"
required = false

[[columns]]
name = "total_billed"
type = "decimal"
required = true
description = "Last known total billed in USD."

[[columns]]
name = "current_balance"
type = "decimal"
required = true
description = "Last known patient balance in USD."

[[columns]]
name = "insurance_carrier"
type = "string"
required = false

[[columns]]
name = "in_network_status"
type = "string"
required = false

[[columns]]
name = "was_emergency"
type = "boolean"
required = false
description = "Render as 'true' or 'false' or empty."

[[columns]]
name = "findings"
type = "string"
required = false
description = "Semicolon-separated list of finding slugs from bill.toml.findings.controlled_vocabulary. Populated by check_completeness.py from audit_billing_errors.py output (_audit.csv per slug). User-added findings are preserved across runs as long as they appear in the controlled vocabulary."

[[columns]]
name = "next_action"
type = "string"
required = true

[[columns]]
name = "next_action_due"
type = "date"
required = true

[[columns]]
name = "last_action_taken"
type = "string"
required = false
description = "Slug of the last completed action, from action.toml.action_type."

[[columns]]
name = "last_action_date"
type = "date"
required = false

[[columns]]
name = "certified_mail_last"
type = "string"
required = false
description = "Most recent certified-mail tracking number used for this bill."

[[columns]]
name = "status"
type = "string"
required = true
description = "Current state of this bill on the dispute lifecycle. The state-machine pipeline writes one of: gathering_evidence | ready_to_dispute | disputed | escalated | settled | closed | superseded. Legacy callers may still use the coarser-grained enum defined in schemas/bill.toml (open | awaiting_response | in_dispute | settled | closed); validate_tracker.py accepts both vocabularies."

[[columns]]
name = "last_statement_date"
type = "date"
required = false
description = "Updated each time a follow-up statement is detected."

# ============================================================================
# Evidence gates — populated by check_completeness.py from the per-folder
# CSVs and matches.csv. Drive the state machine.
# ============================================================================

[[columns]]
name = "has_eob"
type = "string"
required = false
description = "Y if this bill is linked to at least one EOB claim row in matches.csv, else N. Computed by check_completeness.py."

[[columns]]
name = "matched_claim_numbers"
type = "string"
required = false
description = "Semicolon-joined EOB claim numbers linked to this bill via the matcher."

[[columns]]
name = "has_itemization"
type = "string"
required = false
description = "Y if the bill's extracted text passes the kit's itemization detector (3+ distinct dated charge lines, or UB-04/CMS-1500 form structure, or an explicit itemized-statement header). Computed by index_bills_and_claims.py."

[[columns]]
name = "itemization_signals"
type = "string"
required = false
description = "Brief audit trail of which itemization signals matched (dcl=N, ub04_headers, etc.). Useful for debugging false negatives."

# ============================================================================
# State machine — populated by check_completeness.py
# ============================================================================

[[columns]]
name = "next_action"
type = "string"
required = false
description = "Computed next dispute action. Enum: request_eob | request_itemization | request_eob_and_itemization | draft_dispute | negotiate_counter_offer | file_doi_complaint | file_small_claims | await_eob | await_itemization | await_response | await_counter_offer_response | await_doi_response | await_court_date | monitor | see_canonical | await_response_or_file_small_claims | review."

# ============================================================================
# Operational: dates and certified-mail tracking numbers. Filled by the
# user (manually) after mailing each letter. Scripts never overwrite
# values that have been entered here.
# ============================================================================

[[columns]]
name = "eob_request_sent_date"
type = "date"
required = false
description = "Date the EOB-request letter was mailed to the insurer. Filled in by the user after mailing. Drives the state machine: once set, the script stops drafting new EOB-request letters and waits for a response."

[[columns]]
name = "eob_request_tracking"
type = "string"
required = false
description = "USPS certified-mail tracking number for the EOB request."

[[columns]]
name = "itemization_request_sent_date"
type = "date"
required = false
description = "Date the itemization-request letter was mailed to the biller."

[[columns]]
name = "itemization_request_tracking"
type = "string"
required = false
description = "USPS certified-mail tracking number for the itemization request."

[[columns]]
name = "dispute_letter_sent_date"
type = "date"
required = false
description = "Date the substantive dispute letter (NSA / FDCPA / initial dispute / dental / ERISA appeal / negotiation) was mailed."

[[columns]]
name = "dispute_letter_tracking"
type = "string"
required = false
description = "USPS certified-mail tracking number for the dispute letter."

[[columns]]
name = "thirty_day_warning_sent_date"
type = "date"
required = false
description = "Date the 30-day warning letter was mailed (pre-small-claims escalation)."

[[columns]]
name = "thirty_day_warning_tracking"
type = "string"
required = false
description = "USPS certified-mail tracking number for the 30-day warning."

[[columns]]
name = "response_due_date"
type = "date"
required = false
description = "Computed deadline by which the most recent letter expects a response (typically 15 or 30 business days from the most recent *_sent_date)."

# ============================================================================
# Drafted-letter paths — populated by draft_letters_by_state.py. These
# tell the user where the most recently drafted letter lives so they
# can print, sign, and mail it.
# ============================================================================

[[columns]]
name = "drafted_eob_request"
type = "string"
required = false
description = "Relative path (from Health_Bills/) to the drafted EOB-request letter for this dispute, if one has been generated."

[[columns]]
name = "drafted_itemization_request"
type = "string"
required = false
description = "Relative path to the drafted itemization-request letter."

[[columns]]
name = "drafted_dispute_letter"
type = "string"
required = false
description = "Relative path to the drafted substantive dispute letter."

[[columns]]
name = "dispute_template_used"
type = "string"
required = false
description = "Kit template used to draft the dispute letter (itemization | initial_dispute | no_surprises | fdcpa | erisa_appeal | dental_dispute | negotiation_counter_offer)."

# ============================================================================
# Price benchmarking — populated by fetch_price_benchmarks.py. Drives the
# negotiated-counter-offer drafter and provides UCC § 2-305 evidence.
# ============================================================================

[[columns]]
name = "benchmarks_available"
type = "string"
required = false
description = "Y if Billers/<slug>/_benchmarks.csv exists with at least one row where ratio_billed_to_medicare >= 1.50. Used as a gate by draft_letters_by_state.py to decide whether the negotiation_counter_offer template applies."

[[columns]]
name = "counter_offer_amount"
type = "decimal"
required = false
description = "Patient's proposed payment in full satisfaction of the account, in USD. Default the drafter computes is 200% of the sum of Medicare allowables for billed CPTs (plus EOB-allowed amounts for codes with no Medicare rate). The user can override this in tracker.csv before re-running the drafter with --force."

[[columns]]
name = "drafted_counter_offer"
type = "string"
required = false
description = "Relative path to the drafted counter-offer negotiation letter."

[[columns]]
name = "counter_offer_sent_date"
type = "date"
required = false
description = "Date the counter-offer letter was mailed."

[[columns]]
name = "counter_offer_tracking"
type = "string"
required = false
description = "USPS certified-mail tracking number for the counter-offer letter."

# ============================================================================
# State DOI complaint — populated when the user files a parallel pressure
# complaint with the state insurance department or attorney general.
# ============================================================================

[[columns]]
name = "drafted_doi_complaint"
type = "string"
required = false
description = "Relative path to the drafted DOI/AG complaint."

[[columns]]
name = "doi_complaint_sent_date"
type = "date"
required = false
description = "Date the DOI complaint was filed via online portal or mailed."

[[columns]]
name = "doi_complaint_tracking"
type = "string"
required = false
description = "USPS certified-mail tracking number if mailed; portal confirmation reference if filed online."

[[columns]]
name = "doi_complaint_number"
type = "string"
required = false
description = "Case number assigned by the state agency once they accept the complaint."

# ============================================================================
# Small claims / general sessions civil-warrant filing — populated when the
# user files a civil action after the 30-day warning expires.
# ============================================================================

[[columns]]
name = "drafted_small_claims_civil_warrant"
type = "string"
required = false
description = "Relative path to the drafted civil-warrant filing."

[[columns]]
name = "small_claims_filed_date"
type = "date"
required = false
description = "Date the civil warrant was filed with the county clerk."

[[columns]]
name = "small_claims_case_number"
type = "string"
required = false
description = "Case number assigned by the court clerk on filing."

[[columns]]
name = "small_claims_court"
type = "string"
required = false
description = "Court name and county where filed (e.g. 'General Sessions Court for Davidson County, TN')."

[[columns]]
name = "drafted_hipaa_records_request"
type = "string"
required = false
description = "Relative path to the drafted HIPAA § 164.524 records request, populated when audit findings include service_not_received_suspected (auto-triggered by the drafter) or when the user explicitly invokes the records_request_hipaa template via FOLDER_TEMPLATE_OVERRIDES."

[[columns]]
name = "notes"
type = "string"
required = false
description = "Free text. Quote in CSV if contains commas/newlines."
